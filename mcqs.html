        function renderMCQs(data) {
            const container = document.getElementById('mcqContainer');
            if (data.length === 0) {
                container.innerHTML = '<div class="mcq-grid empty">No questions found. Try adjusting your filters.</div>';
                return;
            }
            container.innerHTML = data.map(mcq => `
                <div class="mcq-item" data-category="${mcq.category}">
                    <div class="mcq-header-bar">
                        <span class="mcq-number">Q${mcq.num}</span>
                        <span class="mcq-category">${mcq.category.replace('-', ' ').toUpperCase()}</span>
                    </div>
                    <div class="mcq-body">
                        <div class="mcq-question">${mcq.question}</div>
                        <div class="mcq-options-container">
                            ${mcq.options.map((opt, idx) => `
                                <div class="mcq-opt" onclick="selectMCQOption(this, ${mcq.num}, ${idx}, ${mcq.correct})">
                                    ${opt}
                                </div>
                            `).join('')}
                        </div>
                        <div class="mcq-footer">
                            <button class="show-answer-btn" onclick="showMCQAnswer(this, ${mcq.num}, '${mcq.explanation.replace(/'/g, "\\'")}')">Show Answer</button>
                        </div>
                        <div class="answer-box" id="answer-${mcq.num}">
                            <strong>✓ Correct Answer: ${String.fromCharCode(65 + mcq.correct)}</strong>
                            <p>${mcq.explanation}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function selectMCQOption(element, qNum, selectedIdx, correctIdx) {
            const container = element.closest('.mcq-body');
            const options = container.querySelectorAll('.mcq-opt');
            options.forEach(opt => opt.classList.remove('selected', 'correct', 'incorrect'));
            
            if (selectedIdx === correctIdx) {
                element.classList.add('correct');
            } else {
                element.classList.add('incorrect');
                options[correctIdx].classList.add('correct');
            }
            
            const answerBox = container.querySelector(`#answer-${qNum}`);
            answerBox.classList.add('show');
        }

        function showMCQAnswer(button, qNum, explanation) {
            const answerBox = button.closest('.mcq-body').querySelector(`#answer-${qNum}`);
            answerBox.classList.toggle('show');
            button.textContent = answerBox.classList.contains('show') ? 'Hide Answer' : 'Show Answer';
        }

        function filterMCQs() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            
            const filtered = mcqData.filter(mcq => {
                const matchSearch = mcq.question.toLowerCase().includes(searchText);
                const matchCategory = !category || mcq.category === category;
                return matchSearch && matchCategory;
            });
            
            renderMCQs(filtered);
        }

        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('categoryFilter').value = '';
            renderMCQs(mcqData);
        }

        document.getElementById('searchInput').addEventListener('keyup', filterMCQs);
        document.getElementById('categoryFilter').addEventListener('change', filterMCQs);

        renderMCQs(mcqData);
    </script>
